<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selfie App Download</title>
    <style>
        /* Light mint background */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #f0fdf4;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        /* The Card */
        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(34, 197, 94, 0.15);
            text-align: center;
            width: 90%;
            max-width: 420px;
            box-sizing: border-box;
        }

        /* Typography */
        h1 {
            margin: 0 0 12px;
            font-size: 28px;
            color: #166534;
        }

        p {
            margin: 0 0 20px;
            font-size: 16px;
            line-height: 1.5;
            color: #4b5563;
        }

        /* App Metadata (Size & Version) */
        .app-meta {
            font-size: 14px;
            color: #15803d;
            background-color: #dcfce7;
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 30px;
            font-weight: 600;
        }

        /* The Button */
        .download-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 16px 24px;
            font-size: 18px;
            color: #ffffff;
            background: linear-gradient(135deg, #22c55e 0%, #15803d 100%);
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 8px 24px rgba(34, 197, 94, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            animation: breathe 3s ease-in-out infinite;
            width: 100%;
            box-sizing: border-box;
        }

        /* Desktop Hover */
        .download-btn:hover {
            background: linear-gradient(135deg, #16a34a 0%, #14532d 100%);
            transform: scale(1.03);
            animation: none;
        }

        /* Mobile Touch */
        .download-btn:active {
            transform: scale(0.95);
            box-shadow: 0 4px 10px rgba(21, 128, 61, 0.4);
        }

        /* Subtle Energy Animation */
        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 8px 24px rgba(34, 197, 94, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 12px 30px rgba(34, 197, 94, 0.6); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📱 Selfie App</h1>
        
        <p>Download the latest version of the Selfie Android app (.apk)</p>

        <div class="app-meta">
            File size: ~80MB &middot; Version 2.0.0
        </div>

        <a href="https://github.com/agencyope/redirect/releases/download/main/selfie.apk" class="download-btn">
            ⬇️ Download Selfie.apk
        </a>
    </div>

</body>
</html>
