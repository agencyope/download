<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحميل تطبيق سيلفي</title>
    <style>
        /* Soft, fresh, light-green background */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #f0fdf4; /* Very light mint/green tint */
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .download-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 18px 32px;
            font-size: 22px;
            color: #ffffff;
            /* Vibrant, energetic green gradient */
            background: linear-gradient(135deg, #22c55e 0%, #15803d 100%);
            text-decoration: none;
            /* Fully rounded pill shape for a more organic feel */
            border-radius: 50px; 
            font-weight: bold;
            box-shadow: 0 8px 24px rgba(34, 197, 94, 0.4);
            width: 85%;
            max-width: 320px;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            /* Gentle breathing animation to give it "energy" */
            animation: breathe 3s ease-in-out infinite;
            transition: transform 0.1s ease, box-shadow 0.2s ease;
        }

        /* The breathing effect */
        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 8px 24px rgba(34, 197, 94, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 12px 30px rgba(34, 197, 94, 0.6); }
        }

        /* Snappy physical feedback when pressed on mobile */
        .download-btn:active {
            animation: none; /* Stops the breathing while pressing */
            transform: scale(0.95);
            box-shadow: 0 4px 10px rgba(21, 128, 61, 0.4);
            background: linear-gradient(135deg, #16a34a 0%, #14532d 100%);
        }

        .download-icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <a href="https://github.com/agencyope/redirect/releases/download/main/selfie.apk" class="download-btn">
        <svg class="download-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
        </svg>
        <span>تحميل تطبيق سيلفي</span>
    </a>

</body>
</html>
